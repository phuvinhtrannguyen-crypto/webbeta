<style id="app-style">
/* =========================================================
   ExamHub · Design tokens & global styles
   Made with care — glassmorphism + soft neon + deep space.
   ========================================================= */
:root{
  --bg-0:#05070d;
  --bg-1:#0b1020;
  --bg-2:#12172b;
  --bg-3:#1a2140;
  --surface:#141a33cc;
  --surface-2:#1b2347e6;
  --surface-3:#232c58;
  --stroke:#2a335f;
  --stroke-soft:#1d244a;
  --text:#eef1ff;
  --text-dim:#a9b0d6;
  --text-mute:#7b84b0;
  --primary:#7c5cff;
  --primary-2:#5b8cff;
  --primary-3:#00d4ff;
  --accent:#ff6aa8;
  --accent-2:#ffb86b;
  --success:#32d583;
  --warning:#ffb020;
  --danger:#ff5e7e;
  --info:#5ac8fa;
  --ring: 0 0 0 3px rgba(124,92,255,.35);
  --shadow-sm: 0 2px 10px rgba(4,8,20,.4);
  --shadow-md: 0 10px 30px rgba(6,10,30,.5);
  --shadow-lg: 0 24px 60px rgba(6,10,30,.6);
  --radius-xs:8px;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:20px;
  --radius-xl:28px;
  --gradient-primary: linear-gradient(135deg,#7c5cff 0%,#5b8cff 55%,#00d4ff 100%);
  --gradient-accent: linear-gradient(135deg,#ff6aa8 0%,#ffb86b 100%);
  --gradient-bg: radial-gradient(1200px 800px at 10% 0%,#1a1f4a 0%,transparent 60%),
                 radial-gradient(900px 700px at 100% 10%,#27134a 0%,transparent 55%),
                 radial-gradient(800px 600px at 50% 100%,#0a2347 0%,transparent 50%),
                 linear-gradient(180deg,#05070d 0%,#0a0f22 100%);
  --font-sans: "Inter","Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  --font-display:"Space Grotesk","Inter",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
[data-theme="light"]{
  --bg-0:#f7f8ff;
  --bg-1:#eef1ff;
  --bg-2:#e4e8ff;
  --bg-3:#d8deff;
  --surface:#ffffffcc;
  --surface-2:#ffffffee;
  --surface-3:#f1f3ff;
  --stroke:#d9deff;
  --stroke-soft:#e6e9ff;
  --text:#0f1430;
  --text-dim:#454b74;
  --text-mute:#7b83a8;
  --gradient-bg: radial-gradient(1200px 800px at 10% 0%,#e7e9ff 0%,transparent 60%),
                 radial-gradient(900px 700px at 100% 10%,#ffe7f1 0%,transparent 55%),
                 radial-gradient(800px 600px at 50% 100%,#e0f6ff 0%,transparent 50%),
                 linear-gradient(180deg,#f7f8ff 0%,#eef1ff 100%);
  --shadow-md: 0 10px 30px rgba(40,60,160,.12);
  --shadow-lg: 0 24px 60px rgba(40,60,160,.18);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{min-height:100vh;background:var(--gradient-bg) fixed;overflow-x:hidden}
a{color:var(--primary-3);text-decoration:none}
a:hover{text-decoration:underline}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
textarea{resize:vertical}
::selection{background:rgba(124,92,255,.45);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3a417a,#242a55);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#444c8e}
/* Animated aurora bg blobs */
.aurora{position:fixed;inset:-20% -10% auto -10%;height:80vh;pointer-events:none;z-index:0;filter:blur(60px);opacity:.6}
.aurora::before,.aurora::after{content:"";position:absolute;border-radius:50%;filter:blur(40px);mix-blend-mode:screen;animation:drift 22s ease-in-out infinite alternate}
.aurora::before{width:52vw;height:52vw;left:-10vw;top:-20vw;background:radial-gradient(circle,#7c5cff 0%,transparent 60%)}
.aurora::after{width:44vw;height:44vw;right:-10vw;top:-10vw;background:radial-gradient(circle,#00d4ff 0%,transparent 60%);animation-delay:-6s}
.aurora-2{position:fixed;inset:auto -10% -20% -10%;height:70vh;pointer-events:none;z-index:0;filter:blur(60px);opacity:.5}
.aurora-2::before{content:"";position:absolute;left:30vw;bottom:-10vw;width:50vw;height:50vw;border-radius:50%;background:radial-gradient(circle,#ff6aa8 0%,transparent 60%);filter:blur(60px);animation:drift 28s ease-in-out infinite alternate-reverse}
@keyframes drift{0%{transform:translate3d(-3%,-2%,0) scale(1)}100%{transform:translate3d(4%,3%,0) scale(1.12)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,255,.6)}50%{box-shadow:0 0 0 12px rgba(124,92,255,0)}}
.app-root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
/* ----- Typography ----- */
h1,h2,h3,h4,h5{font-family:var(--font-display);letter-spacing:-.01em;margin:0 0 .4em}
h1{font-size:clamp(28px,4vw,44px);font-weight:800}
h2{font-size:clamp(22px,2.6vw,30px);font-weight:700}
h3{font-size:18px;font-weight:700}
h4{font-size:15px;font-weight:600;color:var(--text-dim)}
p{margin:0 0 .6em;line-height:1.6;color:var(--text-dim)}
.mono{font-family:var(--font-mono)}
.text-gradient{background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;color:transparent}
.text-accent{background:var(--gradient-accent);-webkit-background-clip:text;background-clip:text;color:transparent}
.muted{color:var(--text-mute)}
.dim{color:var(--text-dim)}
.kbd{display:inline-block;padding:2px 6px;border-radius:6px;border:1px solid var(--stroke);background:var(--surface-3);font:500 12px/1 var(--font-mono);color:var(--text-dim)}
/* ----- Buttons ----- */
.btn{
  --btn-bg:var(--surface-3);
  --btn-fg:var(--text);
  --btn-br:var(--stroke);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;border-radius:var(--radius-sm);
  background:var(--btn-bg);color:var(--btn-fg);
  border:1px solid var(--btn-br);
  font-weight:600;font-size:14px;line-height:1;
  transition:transform .08s ease,box-shadow .15s ease,background .15s ease,border-color .15s ease,color .15s ease;
  user-select:none;white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn[disabled],.btn.is-disabled{opacity:.55;cursor:not-allowed;transform:none!important}
.btn-primary{--btn-bg:var(--gradient-primary);--btn-fg:#fff;--btn-br:transparent;box-shadow:0 10px 24px rgba(124,92,255,.35)}
.btn-primary:hover{box-shadow:0 14px 32px rgba(124,92,255,.5)}
.btn-accent{--btn-bg:var(--gradient-accent);--btn-fg:#2b0f1b;--btn-br:transparent}
.btn-ghost{--btn-bg:transparent;--btn-br:var(--stroke)}
.btn-ghost:hover{background:var(--surface-3)}
.btn-danger{--btn-bg:rgba(255,94,126,.14);--btn-fg:#ffb0c1;--btn-br:rgba(255,94,126,.35)}
.btn-danger:hover{--btn-bg:rgba(255,94,126,.24)}
.btn-success{--btn-bg:rgba(50,213,131,.14);--btn-fg:#a6f0c6;--btn-br:rgba(50,213,131,.4)}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn-lg{padding:14px 20px;font-size:15px;border-radius:14px}
.btn-icon{padding:9px;width:36px;height:36px}
.btn .sp{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;border-right-color:transparent;animation:spin 1s linear infinite}
/* ----- Chips / Badges ----- */
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--stroke);border-radius:999px;background:var(--surface-3);color:var(--text-dim);font-size:12px;font-weight:500}
.chip.is-primary{border-color:rgba(124,92,255,.45);background:rgba(124,92,255,.14);color:#cfc4ff}
.chip.is-success{border-color:rgba(50,213,131,.45);background:rgba(50,213,131,.14);color:#a5f0c8}
.chip.is-warning{border-color:rgba(255,176,32,.45);background:rgba(255,176,32,.14);color:#ffd993}
.chip.is-danger{border-color:rgba(255,94,126,.45);background:rgba(255,94,126,.14);color:#ffb3c2}
.chip.is-info{border-color:rgba(90,200,250,.45);background:rgba(90,200,250,.14);color:#bfe6ff}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-mute)}
.dot.is-on{background:var(--success);box-shadow:0 0 0 3px rgba(50,213,131,.2)}
.dot.is-off{background:var(--danger)}
/* ----- Fields ----- */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;color:var(--text-dim);font-weight:500}
.field .hint{font-size:12px;color:var(--text-mute)}
.field .err{font-size:12px;color:var(--danger)}
.input,.textarea,.select{
  width:100%;padding:11px 14px;border-radius:var(--radius-sm);
  background:var(--surface-3);color:var(--text);
  border:1px solid var(--stroke);
  transition:border-color .15s ease,box-shadow .15s ease,background .15s ease;
  font-size:14px;
}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--primary-2);box-shadow:var(--ring)}
.input::placeholder,.textarea::placeholder{color:var(--text-mute)}
.input.is-invalid,.textarea.is-invalid{border-color:var(--danger)}
.input-group{position:relative}
.input-group .input{padding-right:42px}
.input-group .tail{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-mute);display:flex;align-items:center;gap:6px}
.input-group .tail button{padding:4px;border-radius:6px;color:var(--text-mute)}
.input-group .tail button:hover{color:var(--text);background:rgba(255,255,255,.06)}
.switch{position:relative;display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.switch input{appearance:none;width:38px;height:22px;background:var(--surface-3);border:1px solid var(--stroke);border-radius:999px;position:relative;transition:background .15s ease,border-color .15s ease;cursor:pointer}
.switch input::after{content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--text-dim);transition:left .15s ease,background .15s ease}
.switch input:checked{background:linear-gradient(135deg,#7c5cff,#00d4ff);border-color:transparent}
.switch input:checked::after{left:19px;background:#fff}
.check{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.check input{appearance:none;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--stroke);background:var(--surface-3);display:inline-grid;place-items:center;cursor:pointer}
.check input:checked{background:var(--gradient-primary);border-color:transparent}
.check input:checked::after{content:"";width:10px;height:6px;border:2px solid #fff;border-top:0;border-right:0;transform:rotate(-45deg) translate(1px,-1px)}
/* ----- Cards & Panels ----- */
.panel,.card{
  background:var(--surface);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--stroke);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);
  padding:20px;
}
.card{padding:18px;border-radius:var(--radius-md)}
.card.hover{transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.card.hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(124,92,255,.45)}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-t{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700}
.stat{display:flex;flex-direction:column;gap:4px;padding:16px;border-radius:var(--radius-md);background:var(--surface-2);border:1px solid var(--stroke);position:relative;overflow:hidden}
.stat .v{font-family:var(--font-display);font-weight:800;font-size:28px;letter-spacing:-.02em;color:var(--text)}
.stat .l{font-size:12px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.08em}
.stat .trend{font-size:12px}
.stat::after{content:"";position:absolute;right:-10px;top:-10px;width:60px;height:60px;border-radius:50%;background:var(--gradient-primary);filter:blur(20px);opacity:.16;pointer-events:none}
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g-4{grid-template-columns:repeat(4,minmax(0,1fr))}
@media (max-width:1080px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media (max-width:720px){.g-2,.g-3,.g-4{grid-template-columns:1fr}}
/* ----- Tables ----- */
.table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
.table th,.table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--stroke-soft)}
.table th{font-weight:600;color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:.06em;background:var(--surface-3);position:sticky;top:0;z-index:1}
.table tbody tr{transition:background .12s ease}
.table tbody tr:hover{background:rgba(124,92,255,.07)}
.table tbody tr:last-child td{border-bottom:none}
.table .actions{display:flex;gap:6px;justify-content:flex-end}
.table .empty{text-align:center;color:var(--text-mute);padding:34px 10px}
.table-wrap{border:1px solid var(--stroke);border-radius:var(--radius-md);overflow:auto;background:var(--surface);max-height:520px}
.table-wrap.auto{max-height:none}
/* ----- Topbar & Sidebar ----- */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.side{background:linear-gradient(180deg,rgba(10,14,34,.88),rgba(10,14,34,.72));backdrop-filter:blur(16px);border-right:1px solid var(--stroke);padding:18px 14px;display:flex;flex-direction:column;gap:10px;position:sticky;top:0;height:100vh;z-index:20}
.brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--stroke-soft);margin-bottom:6px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:var(--gradient-primary);display:grid;place-items:center;box-shadow:0 6px 18px rgba(124,92,255,.45)}
.brand .logo svg{width:20px;height:20px;color:#fff}
.brand .name{font-family:var(--font-display);font-weight:800;letter-spacing:-.01em;font-size:18px}
.brand .tag{font-size:11px;color:var(--text-mute);letter-spacing:.1em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav .sec{padding:12px 10px 6px;font-size:11px;color:var(--text-mute);letter-spacing:.12em;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;color:var(--text-dim);font-weight:500;font-size:14px;transition:background .12s ease,color .12s ease;border:1px solid transparent}
.nav a:hover{background:var(--surface-3);color:var(--text);text-decoration:none}
.nav a.active{background:linear-gradient(135deg,rgba(124,92,255,.2),rgba(0,212,255,.12));color:#fff;border-color:rgba(124,92,255,.35)}
.nav a svg{width:18px;height:18px;opacity:.9;flex:0 0 auto}
.side .foot{margin-top:auto;padding:10px;border-top:1px solid var(--stroke-soft);display:flex;gap:10px;align-items:center}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gradient-primary);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;text-transform:uppercase;flex:0 0 auto}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:14px 22px;background:linear-gradient(180deg,rgba(5,7,13,.8),rgba(5,7,13,.4));backdrop-filter:blur(12px);border-bottom:1px solid var(--stroke-soft)}
.topbar .title{font-family:var(--font-display);font-weight:700;font-size:18px}
.topbar .crumb{color:var(--text-mute);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar .search{flex:0 1 360px}
.main{padding:22px;display:flex;flex-direction:column;gap:18px;min-width:0}
/* Collapsible side on small screens */
.menu-btn{display:none}
@media (max-width:960px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;left:-280px;top:0;height:100vh;width:260px;transition:left .2s ease;z-index:40;box-shadow:var(--shadow-lg)}
  .side.open{left:0}
  .menu-btn{display:inline-flex}
}
/* ----- Modal ----- */
.modal-backdrop{position:fixed;inset:0;background:rgba(2,4,14,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadeIn .15s ease}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface-2);border:1px solid var(--stroke);border-radius:var(--radius-lg);width:min(540px,96vw);max-height:92vh;overflow:auto;box-shadow:var(--shadow-lg);animation:fadeIn .18s ease}
.modal.lg{width:min(860px,96vw)}
.modal.xl{width:min(1080px,98vw)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--stroke-soft)}
.modal-b{padding:18px 20px}
.modal-f{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--stroke-soft)}
.close-x{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--text-dim)}
.close-x:hover{background:var(--surface-3);color:var(--text)}
/* ----- Toasts ----- */
.toasts{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:200;max-width:360px}
.toast{background:var(--surface-2);border:1px solid var(--stroke);padding:12px 14px;border-radius:var(--radius-md);box-shadow:var(--shadow-md);display:flex;gap:10px;align-items:flex-start;animation:fadeIn .2s ease}
.toast .t{font-weight:600;font-size:14px}
.toast .m{font-size:13px;color:var(--text-dim);margin-top:2px}
.toast.is-success{border-color:rgba(50,213,131,.45)}
.toast.is-error{border-color:rgba(255,94,126,.45)}
.toast.is-warning{border-color:rgba(255,176,32,.45)}
.toast.is-info{border-color:rgba(90,200,250,.45)}
.toast .ic{width:20px;height:20px;flex:0 0 auto;margin-top:1px;border-radius:50%;display:grid;place-items:center}
.toast.is-success .ic{background:rgba(50,213,131,.2);color:#a5f0c8}
.toast.is-error .ic{background:rgba(255,94,126,.2);color:#ffb3c2}
.toast.is-warning .ic{background:rgba(255,176,32,.2);color:#ffd993}
.toast.is-info .ic{background:rgba(90,200,250,.2);color:#bfe6ff}
/* ----- Misc utilities ----- */
.stack{display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.end{display:flex;gap:8px;justify-content:flex-end;align-items:center}
.sep{height:1px;background:var(--stroke-soft);margin:6px 0}
.hide{display:none!important}
.loading{position:relative;pointer-events:none;color:transparent!important}
.loading::after{content:"";position:absolute;inset:0;margin:auto;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.6);border-right-color:transparent;animation:spin .8s linear infinite}
.skeleton{background:linear-gradient(90deg,var(--surface-3) 0%,var(--surface-2) 50%,var(--surface-3) 100%);background-size:200% 100%;animation:shimmer 1.4s linear infinite;border-radius:8px;color:transparent}

const toastRoot = $("#toast-root");
const toast = {
  show(type, title, message="", timeout=3600) {
    const t = el("div", {class:`toast is-${type}`});
    const ic = el("span", {class:"ic"});
    const iconSvg = { success:"check", error:"warn", warning:"warn", info:"info" }[type] || "info";
    ic.appendChild(icon(iconSvg));
    const body = el("div",{},[
      el("div",{class:"t",text:title}),
      message ? el("div",{class:"m",text:message}) : null
    ]);
    const close = el("button",{class:"iconbtn",style:{marginLeft:"auto"},onclick:()=>t.remove()});
    close.appendChild(icon("close"));
    t.append(ic, body, close);
    toastRoot.appendChild(t);
    setTimeout(()=>{ t.style.opacity=0; t.style.transition="opacity .25s ease"; setTimeout(()=>t.remove(),260); }, timeout);
  },
  success(t,m){ this.show("success",t,m); },
  error(t,m){ this.show("error",t,m); },
  warning(t,m){ this.show("warning",t,m); },
  info(t,m){ this.show("info",t,m); }
};

const modalRoot = $("#modal-root");
function openModal({title="", body=null, actions=null, size=""}){
  const back = el("div",{class:"modal-backdrop open"});
  const m = el("div",{class:"modal "+size});
  const header = el("div",{class:"modal-h"},[
    el("div",{class:"row",style:{gap:"10px"}},[ el("h3",{text:title}) ]),
    (()=>{ const b = el("button",{class:"close-x",onclick:()=>back.remove()}); b.appendChild(icon("close")); return b; })()
  ]);
  const bodyEl = el("div",{class:"modal-b"});
  if (body instanceof Node) bodyEl.appendChild(body);
  else if (typeof body === "string") bodyEl.innerHTML = body;
  m.append(header, bodyEl);
  if (actions) {
    const f = el("div",{class:"modal-f"});
    actions.forEach(a => f.appendChild(a));
    m.appendChild(f);
  }
  back.appendChild(m);
  back.addEventListener("click", (e)=>{ if (e.target === back) back.remove(); });
  modalRoot.appendChild(back);
  return { close:()=>back.remove(), el:m };
}
function confirmDialog({title="Xác nhận", message="Bạn có chắc chắn?", danger=false, okText="Đồng ý", cancelText="Huỷ"}){
  return new Promise((resolve)=>{
    let resolved = false;
    const ok = el("button",{class:"btn "+(danger?"btn-danger":"btn-primary"),text:okText,onclick:()=>{ resolved=true; resolve(true); m.close(); }});
    const cancel = el("button",{class:"btn btn-ghost",text:cancelText,onclick:()=>{ resolved=true; resolve(false); m.close(); }});
    const body = el("div",{class:"dim",text:message});
    const m = openModal({ title, body, actions:[cancel, ok] });
    const obs = new MutationObserver(()=>{ if (!modalRoot.contains(m.el) && !resolved){ resolved=true; resolve(false);} });
    obs.observe(modalRoot,{childList:true,subtree:true});
  });
}

/* ---------- Fetch / ensure user profile ---------- */
async function ensureUserProfile(user){
  const ref = doc(db, "users", user.uid);
  let snap = null;
  // Warmup + retry loop. Firestore on restrictive networks throws "client is offline"
  // on the first getDoc call before long-polling has completed its handshake. We
  // nudge the connection with a tiny getDocs() probe, then retry getDoc up to 8 times.
  for (let i = 0; i < 8; i++) {
    try {
      if (i > 0) {
        try { await getDocs(query(collection(db,"users"), limit(1))); } catch(_){}
      }
      snap = await getDoc(ref);
      break;
    } catch(err){
      if (i === 7) {
        // SDK failed; fall back to Firestore REST API to avoid the
        // WebChannel layer. Only WRITE if the document doesn't already exist —
        // never clobber an existing role/status field.
        try {
          const token = await user.getIdToken();
          const base = `https://firestore.googleapis.com/v1/projects/${FIREBASE_CONFIG.projectId}/databases/(default)/documents/users/${user.uid}`;
          const getRes = await fetch(base, { headers:{"Authorization":"Bearer "+token} });
          if (getRes.ok) {
            const data = await getRes.json();
            const fields = data.fields||{};
            const decode = f => f?.stringValue ?? f?.integerValue ?? f?.booleanValue ?? (f?.timestampValue ? new Date(f.timestampValue) : undefined);
            return {
              uid: user.uid,
              email: decode(fields.email)||user.email||"",
              displayName: decode(fields.displayName)||user.displayName||"",
              photoURL: decode(fields.photoURL)||"",
              role: decode(fields.role) || (user.email === ADMIN_EMAIL ? "admin" : "guest"),
              status: decode(fields.status) || "active",
              redeemedKey: decode(fields.redeemedKey),
              lastLogin: decode(fields.lastLogin)
            };
          }
          if (getRes.status === 404) {
            // Doc genuinely missing — create it fresh.
            const role = user.email === ADMIN_EMAIL ? "admin" : "guest";
            const profile = { uid:user.uid, email:user.email||"", displayName:user.displayName||(user.email?.split("@")[0]||"Người dùng"),
              photoURL:user.photoURL||"", role, status:"active", createdAt: serverTimestamp(), lastLogin: serverTimestamp() };
            await setDoc(ref, profile).catch(()=>{});
            return profile;
          }
        } catch(_){}
        // All paths failed — return an in-memory shadow profile so the user can
        // at least see the auth-loading screen instead of hanging forever. DO NOT
        // write to Firestore here — a later action will persist changes.
        return { uid:user.uid, email:user.email||"", displayName:user.displayName||"",
          photoURL:user.photoURL||"", role: user.email === ADMIN_EMAIL ? "admin" : "guest", status:"active" };
      }
      await new Promise(r => setTimeout(r, 400 + 400 * i));
    }
  }
  if (!snap || !snap.exists()) {
    const role = user.email === ADMIN_EMAIL ? "admin" : "guest";
    const profile = {
      uid:user.uid, email:user.email||"", displayName:user.displayName||(user.email?.split("@")[0]||"Người dùng"),
      photoURL:user.photoURL||"", role, createdAt: serverTimestamp(), lastLogin: serverTimestamp(),
      status:"active"
    };
    await setDoc(ref, profile);
    return profile;
  } else {
    // Upgrade to admin if email matches and not already admin
    const p = snap.data();
    if (user.email === ADMIN_EMAIL && p.role !== "admin") {
      await updateDoc(ref,{role:"admin", lastLogin: serverTimestamp()});
      p.role = "admin";
    } else {
      await updateDoc(ref,{lastLogin: serverTimestamp()}).catch(()=>{});
    }
    return p;
  }
}

/* ---------- Teacher-key redemption ---------- */
async function redeemTeacherKey(keyCode, user){
  const keyRef = doc(db, "teacherKeys", keyCode);
  const snap = await getDoc(keyRef);
  if (!snap.exists()) throw new Error("Key không tồn tại");
  const d = snap.data();
  if (d.usedBy) throw new Error("Key đã được sử dụng");
  if (d.expiresAt && d.expiresAt.toDate && d.expiresAt.toDate() < new Date()) throw new Error("Key đã hết hạn");
  await runTransaction(db, async (tx)=>{
    const s = await tx.get(keyRef);
    const dd = s.data();
    if (dd.usedBy) throw new Error("Key đã được sử dụng");
    tx.update(keyRef, { usedBy: user.uid, usedAt: serverTimestamp() });
    tx.update(doc(db,"users",user.uid), { role:"teacher", redeemedKey: keyCode });
  });
}

          const tog = el("button",{type:"button",class:"iconbtn",title:"Hiện/ẩn",onclick:()=>{ input.type = input.type==="password"?"text":"password"; tog.innerHTML=""; tog.appendChild(icon(input.type==="password"?"eye":"eyeoff")); }});
          tog.appendChild(icon("eye"));
          tail.append(tog);
          g.append(input, tail);
          return g;
        })()
      ]);
      return wrap;
    })() : null;
    const subText = mode==="login" ? el("div",{class:"row",style:{justifyContent:"space-between"}},[
      el("label",{class:"check"},[
        el("input",{type:"checkbox",name:"remember",checked:true}),
        el("span",{text:"Ghi nhớ"})
      ]),
      el("a",{href:"#",text:"Quên mật khẩu?",onclick:(e)=>{ e.preventDefault(); mode="forgot"; renderBox(); }})
    ]) : null;
    const submit = el("button",{class:"btn btn-primary btn-block btn-lg",type:"submit",text: mode==="login"?"Đăng nhập":mode==="register"?"Tạo tài khoản":"Gửi email đặt lại"});
    [fieldName, fieldEmail, passWrap, subText, submit].forEach(n => { if (n) form.append(n); });
    // Social row
    const divider = el("div",{class:"divider",text:"hoặc"});
    const btnGoogle = el("button",{class:"btn btn-google btn-block btn-lg",type:"button",onclick:handleGoogle});
    btnGoogle.innerHTML = `${ICONS.google.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" style="width:18px;height:18px"')} <span>Tiếp tục với Google</span>`;
    const social = el("div",{class:"social-row"},[btnGoogle]);
    box.append(form, divider, social);
    if (mode === "login") {
      box.append(el("div",{class:"auth-foot"},[
        el("span",{text:"Chưa có tài khoản? "}),
        el("a",{href:"#",text:"Đăng ký ngay",onclick:(e)=>{ e.preventDefault(); mode="register"; renderBox(); }})
      ]));
    } else if (mode === "register") {
      box.append(el("div",{class:"auth-foot"},[
        el("span",{text:"Đã có tài khoản? "}),
        el("a",{href:"#",text:"Đăng nhập",onclick:(e)=>{ e.preventDefault(); mode="login"; renderBox(); }})
      ]));
    }

    async function handleSubmit(){
      const fd = new FormData(form);
      const email = fd.get("email")?.trim();
      const password = fd.get("password");
      const name = fd.get("name");
      submit.classList.add("loading"); submit.disabled = true;
      try {
        if (mode === "login") {
          await signInWithEmailAndPassword(auth, email, password);
        } else if (mode === "register") {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          if (name) await updateProfile(cred.user, { displayName: name });
          toast.success("Tạo tài khoản thành công!", "Chào mừng đến với ExamHub");
        } else if (mode === "forgot") {
          await sendPasswordResetEmail(auth, email);
          toast.success("Đã gửi email đặt lại mật khẩu", "Hãy kiểm tra hộp thư của bạn.");
          mode="login"; renderBox(); return;
        }
      } catch(err) {
        console.error(err);
        toast.error("Thất bại", prettyAuthError(err));
      } finally {
        submit.classList.remove("loading"); submit.disabled=false;
      }
    }
    async function handleGoogle(){
      btnGoogle.classList.add("loading");
      try {
        await signInWithPopup(auth, googleProvider);
      } catch(err) {
        toast.error("Không đăng nhập được bằng Google", prettyAuthError(err));
      } finally {
        btnGoogle.classList.remove("loading");
      }
    }
  };
  renderBox();
  const right = el("div",{class:"auth-card"});
  right.appendChild(box);
  wrap.append(side, right);
  return wrap;
}

/* =========================================================
   Shell (dashboard) layout helper
   ========================================================= */
function buildShell({role="teacher", nav=[], active="", title="", children=[]}){
  const shell = el("div",{class:"shell"});
  // Sidebar
  const side = el("aside",{class:"side",id:"sidebar"});
  const brand = el("div",{class:"brand"});
  const logoWrap = el("div",{class:"logo"});
  logoWrap.innerHTML = ICONS.logo;
  brand.append(logoWrap, el("div",{},[
    el("div",{class:"name",text:"ExamHub"}),
    el("div",{class:"tag",text: role==="admin"?"Admin console": role==="teacher"?"Teacher workspace":"Student"})
  ]));
  side.appendChild(brand);
  const navWrap = el("div",{class:"nav"});
  nav.forEach(sec => {
    if (sec.section) navWrap.appendChild(el("div",{class:"sec",text:sec.section}));
    if (sec.items) sec.items.forEach(item => {
      const a = el("a",{href:"#",class: item.key===active?"active":"",onclick:(e)=>{ e.preventDefault(); item.onClick && item.onClick(); }});
      a.appendChild(icon(item.icon||"dashboard"));
      a.appendChild(el("span",{text:item.label}));
      if (item.badge != null) a.appendChild(el("span",{class:"chip is-primary",style:{marginLeft:"auto",fontSize:"11px"},text:String(item.badge)}));
      navWrap.appendChild(a);
    });
  });
  side.appendChild(navWrap);
  const foot = el("div",{class:"foot"});
  const av = el("div",{class:"avatar",text: (state.profile?.displayName||state.profile?.email||"?").charAt(0)});
  const info = el("div",{style:{minWidth:0,flex:1}},[
    el("div",{class:"ellipsis",style:{fontWeight:600,fontSize:"13px"},text: state.profile?.displayName || state.profile?.email || "—"}),
    el("div",{class:"ellipsis muted",style:{fontSize:"11px"},text: state.profile?.email || ""})
  ]);
  const logoutBtn = el("button",{class:"iconbtn tooltip","data-tip":"Đăng xuất",onclick:async()=>{ await signOut(auth); }});
  logoutBtn.appendChild(icon("logout"));
  foot.append(av, info, logoutBtn);
  side.appendChild(foot);
  // Topbar + main
  const right = el("div",{style:{minWidth:0,display:"flex",flexDirection:"column"}});
  const topbar = el("header",{class:"topbar"});
  const menu = el("button",{class:"iconbtn menu-btn",onclick:()=>{ side.classList.toggle("open"); }});
  menu.appendChild(icon("menu"));
  const roleBadge = el("span",{class:"badge "+(role==="admin"?"is-admin":role==="teacher"?"is-teacher":role==="student"?"is-student":""),text: role.toUpperCase()});
  topbar.append(
    menu,
    el("div",{},[
      el("div",{class:"crumb",text:"ExamHub / " + role}),
      el("div",{class:"title",text:title})
    ]),
    el("div",{class:"spacer"}),
    roleBadge,
    ...(state.profile?.role === "subadmin" ? [el("span",{class:"badge is-sub",text:"SUBADMIN"})] : [])
  );
  const main = el("main",{class:"main"});
  children.forEach(c => c && main.appendChild(c));
  right.append(topbar, main);
  shell.append(side, right);
  return shell;
}

/* =========================================================
   ADMIN VIEW
   - Accounts management (with role assignments)
   - Teacher keys generator
   - Exam review (all exams across all teachers)
   - Google Gemini API key storage (saved in Firestore so teachers use it)
   - Autofill global toggle (visible only to admin/subadmin)
   ========================================================= */
function renderAdmin(){
  let active = "overview";
  const body = el("div",{class:"stack"});
  const nav = [
    { section:"Quản trị", items:[
      { key:"overview", label:"Tổng quan", icon:"dashboard", onClick:()=>{ active="overview"; refresh(); } },
      { key:"users", label:"Tài khoản", icon:"users", onClick:()=>{ active="users"; refresh(); } },
      { key:"keys", label:"Key giáo viên", icon:"key", onClick:()=>{ active="keys"; refresh(); } },
      { key:"exams", label:"Kiểm duyệt đề", icon:"file", onClick:()=>{ active="exams"; refresh(); } },
      { key:"requests", label:"Yêu cầu", icon:"bell", onClick:()=>{ active="requests"; refresh(); } },
    ]},
    { section:"Cấu hình", items:[
      { key:"settings", label:"API & cài đặt", icon:"settings", onClick:()=>{ active="settings"; refresh(); } },
    ]}
  ];
  const shell = buildShell({role:"admin", nav, active, title:"Bảng điều khiển Admin", children:[body]});
  // Re-render on tab change
  function refresh(){
    const hasSide = shell.querySelector(".side");
    // Rebuild fully
    state.route = "admin";
    const next = renderAdmin.bind(null);
    // Simple approach: we just re-render entire route
    navigate("admin", {tab: active});
  }
  // Use params to avoid infinite recursion
  const tab = state.params?.tab || "overview";
  // Build body for current tab
  body.appendChild(adminTab(tab));
  // Fix sidebar active state
  const navLinks = shell.querySelectorAll(".nav a");
  navLinks.forEach(a => a.classList.remove("active"));
  const idx = {overview:0,users:1,keys:2,exams:3,requests:4,settings:5}[tab] ?? 0;
  if (navLinks[idx]) navLinks[idx].classList.add("active");
  return shell;
}

function adminTab(tab){
  if (tab === "overview") return adminOverview();
  if (tab === "users") return adminUsers();
  if (tab === "keys") return adminKeys();
  if (tab === "exams") return adminExams();
  if (tab === "requests") return adminRequests();
  if (tab === "settings") return adminSettings();
  return adminOverview();
}

  const code = uid(12);
  await setDoc(doc(db, "teacherKeys", code), {
    code, createdAt: serverTimestamp(), createdBy: state.user.uid, usedBy: null, note: "",
  });

function adminUsers(){
  const wrap = el("div",{class:"stack"});
  const head = el("div",{class:"panel"});
  head.innerHTML = `
    <div class="card-h">
      <div class="card-t">${ICONS.users}<span>Tài khoản hệ thống</span></div>
    </div>
    <p class="dim">Quản lý toàn bộ tài khoản. Chỉ admin gốc (${ADMIN_EMAIL}) mới có thể cấp quyền phó admin.</p>`;
  wrap.appendChild(head);
  const search = el("input",{class:"input",placeholder:"Tìm theo email hoặc tên…"});
  const table = el("div",{class:"table-wrap"});
  const thead = ["Người dùng","Email","Vai trò","Trạng thái","Tạo lúc",""];
  const render = (rows) => {
    table.innerHTML = "";
    const t = el("table",{class:"table"});
    const h = el("thead"); const hr = el("tr"); thead.forEach(c => hr.appendChild(el("th",{text:c}))); h.appendChild(hr); t.appendChild(h);
    const tb = el("tbody");
    if (!rows.length) { tb.innerHTML = `<tr><td colspan="6" class="empty">Không có tài khoản nào.</td></tr>`; }
    rows.forEach(r => {
      const tr = el("tr");
      const roleBadge = `<span class="badge ${r.role==="admin"?"is-admin":r.role==="subadmin"?"is-sub":r.role==="teacher"?"is-teacher":r.role==="student"?"is-student":""}">${r.role||"guest"}</span>`;
      const statusDot = `<span class="dot ${r.status==="disabled"?"is-off":"is-on"}"></span> <span class="fs-13">${r.status||"active"}</span>`;
      tr.innerHTML = `
        <td><div class="row"><div class="avatar" style="width:30px;height:30px;font-size:12px">${esc((r.displayName||r.email||"?").charAt(0))}</div><div><div style="font-weight:600">${esc(r.displayName||"—")}</div><div class="muted fs-12">${esc(r.uid||"")}</div></div></div></td>
        <td>${esc(r.email||"")}</td>
        <td>${roleBadge}</td>
        <td>${statusDot}</td>
        <td class="fs-13 dim">${fmtDate(r.createdAt)}</td>
        <td class="actions"></td>`;
      const actions = tr.querySelector(".actions");
      // Role controls
      const sel = el("select",{class:"select",style:{padding:"6px 8px",fontSize:"12px"},onchange: async (e)=>{
        const nr = e.target.value;
        if (r.email === ADMIN_EMAIL && nr !== "admin") { toast.warning("Không thể thay đổi vai trò admin gốc"); e.target.value="admin"; return; }
        if (nr === "subadmin" && !isAdmin(state.profile)) { toast.error("Chỉ admin gốc mới cấp phó admin"); return; }
        try { await updateDoc(doc(db,"users",r.uid),{role: nr}); toast.success("Đã cập nhật vai trò"); }
        catch(err){ toast.error("Thất bại", err.message); }
      }});
      ["guest","student","teacher","subadmin","admin"].forEach(ro => sel.appendChild(el("option",{value:ro,text:ro, selected:r.role===ro})));
      actions.appendChild(sel);
      const del = el("button",{class:"btn btn-danger btn-sm",onclick: async ()=>{
        if (r.email === ADMIN_EMAIL) return toast.warning("Không thể xoá admin gốc");
        if (!await confirmDialog({title:"Xoá tài khoản",message:`Xoá vĩnh viễn tài khoản ${r.email}? (Xoá trong Firestore, không xoá trong Firebase Auth)`,danger:true,okText:"Xoá"})) return;
        await deleteDoc(doc(db,"users",r.uid));
        toast.success("Đã xoá tài khoản");
      }});
      del.append(icon("trash"));
      actions.appendChild(del);
      const toggle = el("button",{class:"btn btn-ghost btn-sm",text: r.status==="disabled"?"Mở khoá":"Khoá",onclick: async ()=>{
        await updateDoc(doc(db,"users",r.uid),{status: r.status==="disabled"?"active":"disabled"});
      }});
      actions.appendChild(toggle);
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    table.appendChild(t);
  };
  const unsub = onSnapshot(collection(db,"users"), (snap)=>{
    const rows = []; snap.forEach(d => rows.push({uid:d.id, ...d.data()}));
    rows.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    state.cache.users = rows;
    applyFilter();
  });
  state.subs.push(unsub);
  const applyFilter = () => {
    const q = (search.value||"").toLowerCase().trim();
    const rows = state.cache.users.filter(r =>
      !q || (r.email||"").toLowerCase().includes(q) || (r.displayName||"").toLowerCase().includes(q)
    );
    render(rows);
  };
  search.addEventListener("input", debounce(applyFilter, 150));
  wrap.append(el("div",{class:"panel"},[search, el("div",{style:{height:"12px"}}), table]));
  return wrap;
}

    if (snap.empty) grid.appendChild(el("div",{class:"blank"},[el("div",{class:"ic"},[icon("file")]),el("div",{text:"Chưa có đề nào."})]));
    const docs = []; snap.forEach(d => docs.push({id:d.id, ...d.data()}));

    docs.forEach(ex => {
      const c = el("div",{class:"card hover"});
      const statusChip = ex.status==="approved" ? '<span class="chip is-success">Đã duyệt</span>' :

      `;
      c.querySelector('[data-act="view"]').onclick = async () => {
        try { await loadExamAnswers(ex); } catch(err) { toast.warning("Không tải được đáp án", err.message||""); }
        showExamPreview(ex);
      };
      c.querySelector('[data-act="approve"]').onclick = () => updateDoc(doc(db,"exams",ex.id),{status:"approved",reviewedAt:serverTimestamp()}).then(()=>toast.success("Đã duyệt đề"));
      c.querySelector('[data-act="reject"]').onclick = () => updateDoc(doc(db,"exams",ex.id),{status:"rejected",reviewedAt:serverTimestamp()}).then(()=>toast.success("Đã từ chối đề"));
      c.querySelector('[data-act="delete"]').onclick = async () => {
        if (!await confirmDialog({title:"Xoá đề",message:"Xoá vĩnh viễn đề này?",danger:true})) return;
        await deleteDoc(doc(db,"exams",ex.id,"private","answers")).catch(()=>{});
        await deleteDoc(doc(db,"exams",ex.id));
      };
      grid.appendChild(c);
    });
  });
  state.subs.push(unsub);
  wrap.appendChild(grid);
  return wrap;
}

function showExamPreview(ex){
  const body = el("div",{class:"stack"});
  body.append(
    el("div",{class:"row"},[
      el("span",{class:"tag",text:`${(ex.questions||[]).length} câu`}),
      el("span",{class:"tag",text: ex.type||"exam"}),
      el("span",{class:"tag",text: (ex.duration||0)+" phút"}),
    ]),
    el("p",{class:"dim",text:ex.description||""})
  );
  (ex.questions||[]).forEach((q,i) => {
    const qCard = el("div",{class:"q"});
    qCard.innerHTML = `<div class="idx">Câu ${i+1}</div><div class="stem">${nl2br(q.stem||"")}</div>`;
    if (q.type === "mcq" && q.options) {
      const o = el("div",{class:"opts"});
      q.options.forEach((opt,idx) => {
        const k = String.fromCharCode(65+idx);
        const d = el("div",{class:"opt" + (q.answer===idx||q.answer===k?" sel":"")});
        d.innerHTML = `<span class="k">${k}</span><span>${nl2br(opt)}</span>`;
        o.appendChild(d);
      });
      qCard.appendChild(o);
    } else if (q.type === "fill" || q.type === "short") {
      qCard.appendChild(el("div",{class:"dim fs-13",text:"Đáp án: "+(q.answer||"(trống)")}));
    }
    body.appendChild(qCard);
  });
  openModal({title:ex.title||"Xem đề", size:"xl", body, actions:[] });
}

function renderTeacher(){
  const tab = state.params?.tab || "overview";
  const body = el("div",{class:"stack"});
  const nav = [
    { section:"Giảng dạy", items:[
      { key:"overview", label:"Tổng quan", icon:"dashboard", onClick:()=>navigate("teacher",{tab:"overview"}) },
      { key:"classes", label:"Lớp học", icon:"school", onClick:()=>navigate("teacher",{tab:"classes"}) },
      { key:"exams", label:"Đề thi / Luyện đề", icon:"file", onClick:()=>navigate("teacher",{tab:"exams"}) },
      { key:"autogen", label:"Tạo đề bằng AI", icon:"wand", onClick:()=>navigate("teacher",{tab:"autogen"}) },
      { key:"stats", label:"Thống kê & bài nộp", icon:"chart", onClick:()=>navigate("teacher",{tab:"stats"}) },
    ]},
    { section:"Tài khoản", items:[
      { key:"profile", label:"Hồ sơ", icon:"users", onClick:()=>navigate("teacher",{tab:"profile"}) },
    ]}
  ];
  const shell = buildShell({role:"teacher", nav, active:tab, title:"Không gian Giáo viên", children:[body]});
  body.appendChild(teacherTab(tab));

  return shell;
}

function teacherTab(tab){
  if (tab==="overview") return teacherOverview();
  if (tab==="classes") return teacherClasses();
  if (tab==="exams") return teacherExams();
  if (tab==="autogen") return teacherAutogen();
  if (tab==="stats") return teacherStats();
  if (tab==="profile") return teacherProfile();
  return teacherOverview();
}

        await deleteDoc(doc(db,"exams",ex.id,"private","answers")).catch(()=>{});
        await deleteDoc(doc(db,"exams",ex.id));
      };
      // Extra toolbar row — share (QR), unlock, publish
      const extra = el("div",{class:"row end",style:{gap:"6px",marginTop:"6px"}});
      const btnShare = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>shareExamDialog(ex)});
      btnShare.append(icon("link"), el("span",{text:"Chia sẻ"}));
      extra.appendChild(btnShare);
      if (ex.locked) {
        const unlock = el("button",{class:"btn btn-success btn-sm",onclick:async()=>{
          await updateDoc(doc(db,"exams",ex.id),{locked:false});
          toast.success("Đã mở khoá bài thi");
        }});
        unlock.append(icon("check"), el("span",{text:"Mở khoá"}));
        extra.appendChild(unlock);
      } else {
        const lockBtn = el("button",{class:"btn btn-ghost btn-sm",onclick:async()=>{
          await updateDoc(doc(db,"exams",ex.id),{locked:true});
          toast.success("Đã khoá bài thi");
        }});
        lockBtn.append(icon("shield"), el("span",{text:"Khoá"}));
        extra.appendChild(lockBtn);
      }
      card.appendChild(extra);
      grid.appendChild(card);
    });
  });
  state.subs.push(u);
  wrap.appendChild(grid);
  return wrap;
}

function showExamSubs(ex){
  const body = el("div",{class:"stack"});
  // Per-question analytics
  const analytics = el("div",{class:"panel"});
  analytics.innerHTML = `<div class="card-h"><div class="card-t">${ICONS.chart}<span>Phân tích theo câu hỏi</span></div></div>`;
  const analyticsBody = el("div",{class:"stack"});
  analytics.appendChild(analyticsBody);
  body.appendChild(analytics);
  // Top-scorer leaderboard
  const leader = el("div",{class:"panel"});
  leader.innerHTML = `<div class="card-h"><div class="card-t">${ICONS.sparkles}<span>Top 5 điểm cao nhất</span></div></div>`;
  const leaderBody = el("div",{class:"stack"});
  leader.appendChild(leaderBody);
  body.appendChild(leader);
  const list = el("div",{class:"table-wrap"});
  body.appendChild(list);
  const u = onSnapshot(query(collection(db,"submissions"), where("examId","==",ex.id)), s => {
    const t = el("table",{class:"table"});
    t.innerHTML = `<thead><tr><th>Học sinh</th><th>Điểm</th><th>Số câu đúng</th><th>Lần thoát</th><th>Nộp lúc</th><th></th></tr></thead>`;
    const tb = el("tbody");
    if (s.empty) tb.innerHTML = `<tr><td colspan="6" class="empty">Chưa có bài nộp nào.</td></tr>`;
    const docs = []; s.forEach(d => docs.push({id:d.id, ...d.data()}));
    docs.sort((a,b)=>(b.submittedAt?.seconds||0)-(a.submittedAt?.seconds||0));
    docs.forEach(sub => {
      const tr = el("tr");
      const pct = sub.score != null ? Math.round(sub.score*100) : null;
      const cls = pct==null?"":pct>=70?"ok":pct>=40?"mid":"bad";
      tr.innerHTML = `
        <td>${esc(sub.studentName||sub.studentId||"?")}</td>
        <td>${pct==null?"—":`<span class="pill-score ${cls}">${pct}%</span>`}</td>
        <td>${sub.correctCount ?? "—"} / ${sub.total ?? "?"}</td>
        <td>${sub.violations ?? 0}</td>
        <td class="fs-13 dim">${fmtDate(sub.submittedAt)}</td>
        <td class="actions"></td>`;
      const view = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>showSubmissionDetail(sub, ex)});
      view.append(icon("eye"), el("span",{text:"Xem"}));
      tr.querySelector(".actions").appendChild(view);
      tb.appendChild(tr);
    });
    t.appendChild(tb); list.innerHTML=""; list.appendChild(t);
    // Analytics: for each question, percentage correct
    analyticsBody.innerHTML = "";
    if (!docs.length) {
      analyticsBody.appendChild(el("div",{class:"dim",text:"Chưa có dữ liệu phân tích."}));
    } else {
      const counts = (ex.questions||[]).map(()=>({correct:0,partial:0,wrong:0,empty:0}));
      docs.forEach(sub => {
        (ex.questions||[]).forEach((q,i) => {
          const g = (sub.grading||{})[String(i)];
          const a = (sub.answers||{})[String(i)];
          if (a == null || a === "") counts[i].empty++;
          else if (g === true) counts[i].correct++;
          else if (g === "partial") counts[i].partial++;
          else counts[i].wrong++;
        });
      });
      counts.forEach((c,i) => {
        const total = docs.length;
        const pct = Math.round((c.correct/total)*100);
        const row = el("div",{class:"card"});
        const diff = pct >= 80 ? "ok" : pct >= 50 ? "mid" : "bad";
        row.innerHTML = `
          <div class="row" style="justify-content:space-between;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div class="idx">Câu ${i+1}</div>
              <div class="ellipsis">${esc((ex.questions[i].stem||"").slice(0,140))}</div>
            </div>
            <div class="nowrap"><span class="pill-score ${diff}">${pct}%</span></div>
          </div>
          <div class="row" style="gap:6px;margin-top:6px">
            <span class="chip is-success">Đúng ${c.correct}</span>
            <span class="chip is-warning">Một phần ${c.partial}</span>
            <span class="chip is-danger">Sai ${c.wrong}</span>
            <span class="chip">Bỏ trống ${c.empty}</span>
          </div>
          <div class="progress mt-2"><span style="width:${pct}%"></span></div>
        `;
        analyticsBody.appendChild(row);
      });
    }
    // Leaderboard
    leaderBody.innerHTML = "";
    const top = [...docs].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
    if (!top.length) leaderBody.appendChild(el("div",{class:"dim",text:"Chưa có dữ liệu."}));
    top.forEach((r,i) => {
      const pct = r.score!=null?Math.round(r.score*100):0;
      leaderBody.appendChild(el("div",{class:"row",style:{justifyContent:"space-between",padding:"6px 0",borderBottom:"1px dashed var(--stroke-soft)"}},[
        el("div",{class:"row gap-3"},[
          el("div",{class:"avatar",style:{width:"28px",height:"28px",fontSize:"12px"},text:(r.studentName||"?").charAt(0)}),
          el("div",{},[
            el("div",{style:{fontWeight:600,fontSize:"13px"},text:r.studentName||"?"}),
            el("div",{class:"muted fs-12",text:fmtDate(r.submittedAt)})
          ])
        ]),
        el("div",{class:"row gap-2"},[
          el("span",{class:"chip",text:`Top ${i+1}`}),
          el("span",{class:"pill-score "+(pct>=70?"ok":pct>=40?"mid":"bad"),text: pct+"%"})
        ])
      ]));
    });
  });
  state.subs.push(u);
  openModal({title:`Bài nộp · ${ex.title}`, size:"xl", body, actions:[]});
}

  const duration = el("input",{class:"input",type:"number",min:1,value: edit?.duration||30,placeholder:"Thời gian (phút)"});
  const classSel = el("select",{class:"select"});
  classSel.append(el("option",{value:"",text:"— Không gán lớp (công khai link) —"}));
  state.cache.classes.forEach(c => classSel.appendChild(el("option",{value:c.id,text:c.name,selected: edit?.classId===c.id})));
  const antiCheat = el("input",{type:"checkbox",checked: edit?.antiCheat !== false});
  const maxViolations = el("input",{class:"input",type:"number",min:1,max:10,value: edit?.maxViolations||3});
  const requireFullscreen = el("input",{type:"checkbox",checked: edit?.requireFullscreen !== false});
  const blockCopy = el("input",{type:"checkbox",checked: edit?.blockCopy !== false});
  const requireLogin = el("input",{type:"checkbox",checked: !!edit?.requireLogin});
  body.append(
    el("div",{class:"grid g-2"},[
      el("div",{class:"field"},[el("label",{text:"Tên đề"}), title]),
      el("div",{class:"field"},[el("label",{text:"Loại"}), type]),
    ]),
    el("div",{class:"field"},[el("label",{text:"Mô tả"}), desc]),
    el("div",{class:"grid g-3"},[
      el("div",{class:"field"},[el("label",{text:"Thời gian (phút)"}), duration]),
      el("div",{class:"field"},[el("label",{text:"Lớp áp dụng"}), classSel]),
      el("div",{class:"field"},[el("label",{text:"Số lần thoát tối đa"}), maxViolations]),
    ]),
    el("details",{class:"cfg"},[
      el("summary",{text:"Cấu hình chống gian lận"}),
      el("div",{class:"stack",style:{marginTop:"8px"}},[
        el("label",{class:"switch"},[antiCheat, el("span",{text:"Bật chống gian lận"})]),
        el("label",{class:"switch"},[requireFullscreen, el("span",{text:"Bắt buộc fullscreen mới làm được"})]),
        el("label",{class:"switch"},[blockCopy, el("span",{text:"Khoá copy-paste trên trang HS"})]),
        el("label",{class:"switch"},[requireLogin, el("span",{text:"Bắt buộc học sinh đăng nhập"})]),
      ])
    ])
  );
  // Questions editor
  let questions = structuredClone(edit?.questions || []);
  const qWrap = el("div",{class:"stack"});
  const renderQs = () => {
    qWrap.innerHTML = "";
    questions.forEach((q,i) => {
      const card = el("div",{class:"q"});
      const head = el("div",{class:"row",style:{justifyContent:"space-between"}},[
        el("div",{class:"idx",text:`Câu ${i+1}`}),
        (()=>{ const del = el("button",{class:"iconbtn",onclick:()=>{ questions.splice(i,1); renderQs(); }}); del.append(icon("trash")); return del; })()
      ]);
      const stem = el("textarea",{class:"textarea",placeholder:"Nội dung câu hỏi (dùng dấu ........ cho đục lỗ)",oninput:e=>q.stem=e.target.value});
      stem.value = q.stem||"";
      const typeSel = el("select",{class:"select",onchange:e=>{ q.type=e.target.value; renderQs(); }});
      ["mcq","fill","short"].forEach(v=>typeSel.appendChild(el("option",{value:v,text:v==="mcq"?"Trắc nghiệm":v==="fill"?"Điền khuyết":"Tự luận ngắn",selected:q.type===v})));
      card.append(head, el("div",{class:"field"},[el("label",{text:"Loại"}),typeSel]), el("div",{class:"field"},[el("label",{text:"Nội dung"}),stem]));
      if (q.type === "mcq") {
        q.options = q.options || ["","","",""];
        const opts = el("div",{class:"stack"});
        q.options.forEach((o,oi) => {
          const row = el("div",{class:"row",style:{gap:"6px"}});
          const letter = String.fromCharCode(65+oi);
          const isAns = q.answer === oi || q.answer === letter;
          const radio = el("input",{type:"radio",name:`ans_${i}`,checked:isAns,onchange:()=>{ q.answer = oi; }});
          const input = el("input",{class:"input",value:o,placeholder:"Lựa chọn "+letter,oninput:e=>q.options[oi]=e.target.value});
          row.append(el("span",{class:"k mono",style:{width:"18px"},text:letter}), radio, input);
          opts.appendChild(row);
        });
        const addOpt = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>{ q.options.push(""); renderQs(); }});
        addOpt.append(icon("plus"),el("span",{text:"Thêm lựa chọn"}));
        card.append(el("div",{class:"field"},[el("label",{text:"Đáp án"}), opts, addOpt]));
      } else {
        const ans = el("input",{class:"input",placeholder:"Đáp án (có thể ngăn cách bằng | nếu nhiều đáp án đúng)",value: Array.isArray(q.answer)?q.answer.join(" | "):(q.answer||""),oninput:e=>{ q.answer = e.target.value.includes("|") ? e.target.value.split("|").map(s=>s.trim()) : e.target.value; }});
        card.append(el("div",{class:"field"},[el("label",{text:"Đáp án"}), ans]));
      }
      qWrap.appendChild(card);
    });
    if (!questions.length) qWrap.appendChild(el("div",{class:"blank"},[el("div",{class:"ic"},[icon("file")]),el("div",{text:"Chưa có câu hỏi."})]));
  };
  renderQs();
  const addQ = el("button",{class:"btn btn-ghost",onclick:()=>{ questions.push({type:"mcq", stem:"", options:["","","",""], answer:0}); renderQs(); }});
  addQ.append(icon("plus"),el("span",{text:"Thêm câu hỏi"}));
  const addFill = el("button",{class:"btn btn-ghost",onclick:()=>{ questions.push({type:"fill", stem:"........ ", answer:""}); renderQs(); }});
  addFill.append(icon("plus"),el("span",{text:"Thêm câu điền khuyết"}));
  body.append(el("div",{class:"panel"},[el("div",{class:"card-h"},[el("div",{class:"card-t"},[icon("exam"),el("span",{text:"Câu hỏi"})]), el("div",{class:"row"},[addQ,addFill])]), qWrap]));
  const cancel = el("button",{class:"btn btn-ghost",text:"Huỷ",onclick:()=>m.close()});
  const save = el("button",{class:"btn btn-primary",text: edit?"Lưu":"Tạo đề",onclick:async()=>{
    if (!title.value.trim()) return toast.warning("Thiếu tên đề");
    if (!questions.length) return toast.warning("Thiếu câu hỏi");
    save.classList.add("loading");
    // Split answers out of the public exam doc before saving — the answer key
    // lives in exams/{eid}/private/answers and is written separately below.
    const publicQuestions = stripAnswersFromQuestions(questions);
    const payload = {
      title:title.value.trim(), description:desc.value.trim(),
      type:type.value, duration:Number(duration.value)||30,
      classId:classSel.value||null, className: state.cache.classes.find(c=>c.id===classSel.value)?.name||null,
      antiCheat: antiCheat.checked, requireFullscreen: requireFullscreen.checked, blockCopy: blockCopy.checked, requireLogin: requireLogin.checked,
      maxViolations: Number(maxViolations.value)||3,
      questions: publicQuestions, teacherId:state.user.uid, teacherEmail:state.user.email, status:"pending",
      updatedAt: serverTimestamp(), locked:false
    };
    try {
      let examId;
      if (edit) { examId = edit.id; await updateDoc(doc(db,"exams",examId), payload); }
      else { payload.createdAt = serverTimestamp(); const ref = await addDoc(collection(db,"exams"), payload); examId = ref.id; }
      await writeExamAnswers(examId, questions);
      toast.success("Đã lưu đề"); m.close();
    } catch(err){ toast.error("Không lưu được", err.message); }
    finally { save.classList.remove("loading"); }
  }});
  const m = openModal({title: edit?"Sửa đề":"Tạo đề thi", size:"xl", body, actions:[cancel, save]});
}

/* ---------- Autogen (AI) tab ---------- */
function teacherAutogen(){
  const wrap = el("div",{class:"stack"});
  const p = el("div",{class:"panel stack"});
  p.append(
    el("div",{class:"card-h"},[el("div",{class:"card-t"},[icon("wand"),el("span",{text:"Tạo đề bằng Gemini"})])]),
    el("p",{class:"dim",text:"Dán nội dung file câu hỏi (hoặc upload .txt) và yêu cầu. AI sẽ tự tạo đề theo đúng cấu trúc."})
  );
  const content = el("textarea",{class:"textarea",rows:8,placeholder:"Dán nội dung tài liệu / bài giảng ở đây…"});
  const answerKey = el("textarea",{class:"textarea",rows:5,placeholder:"Dán file đáp án (nếu có). Với đề điền khuyết, chỗ điền dùng dấu ........"});
  const requirement = el("textarea",{class:"textarea",rows:3,placeholder:"Yêu cầu (VD: tạo 10 câu trắc nghiệm 4 lựa chọn, khó dần, chủ đề…)"});
  const upBtn = el("input",{type:"file",accept:".txt,.md,.csv"});
  upBtn.addEventListener("change", async e => {
    const f = e.target.files[0]; if (!f) return;
    const text = await f.text(); content.value = text;
  });
  const upBtn2 = el("input",{type:"file",accept:".txt,.md,.csv"});
  upBtn2.addEventListener("change", async e => {
    const f = e.target.files[0]; if (!f) return;
    const text = await f.text(); answerKey.value = text;
  });
  p.append(
    el("div",{class:"field"},[el("label",{text:"Tài liệu / câu hỏi gốc"}), content, upBtn]),
    el("div",{class:"field"},[el("label",{text:"File đáp án (tuỳ chọn)"}), answerKey, upBtn2]),
    el("div",{class:"field"},[el("label",{text:"Yêu cầu"}), requirement])
  );
  const go = el("button",{class:"btn btn-primary",onclick: async ()=>{
    if (!content.value.trim()) return toast.warning("Thiếu nội dung");
    go.classList.add("loading");
    try {
      const apiKey = await getGeminiKey();
      if (!apiKey) { toast.error("Chưa có Gemini API key","Admin vào mục Cài đặt để nhập."); return; }
      const qs = await geminiGenerate(apiKey, content.value, answerKey.value, requirement.value);
      if (!qs?.length) return toast.error("AI không trả về câu hỏi nào");
      toast.success("Đã tạo đề","Mở hộp thoại để chỉnh & lưu.");
      const ex = { title: (requirement.value||"").slice(0,60) || "Đề AI "+new Date().toLocaleString(), description: "Sinh tự động bởi Gemini", type:"exam", duration:30, antiCheat:true, questions: qs };
      createExamDialog(ex);
    } catch(err) {
      toast.error("Lỗi AI", err.message||String(err));
    } finally {
      go.classList.remove("loading");
    }
  }});
  go.append(icon("wand"),el("span",{text:"Tạo đề"}));
  p.appendChild(el("div",{class:"row"},[go]));
  wrap.appendChild(p);
  // Fill-in-the-blank helper
  const p2 = el("div",{class:"panel stack"});
  p2.append(
    el("div",{class:"card-h"},[el("div",{class:"card-t"},[icon("edit"),el("span",{text:"Đề đục lỗ từ file"})])]),
    el("p",{class:"dim",text:'Dán đoạn văn có dấu ........ (6 hoặc nhiều chấm liên tiếp) và đáp án tương ứng theo thứ tự từng dấu. Hệ thống sẽ tạo đề điền khuyết tự động.'})
  );
  const blankText = el("textarea",{class:"textarea",rows:6,placeholder:"Đoạn văn có dấu ........"});
  const blankAns = el("textarea",{class:"textarea",rows:4,placeholder:"Đáp án, mỗi dòng 1 từ / cụm từ theo đúng thứ tự dấu ........"});
  const go2 = el("button",{class:"btn btn-primary",onclick:()=>{
    const text = blankText.value;
    const answers = blankAns.value.split("\n").map(s=>s.trim()).filter(Boolean);
    const blanks = (text.match(/\.{6,}/g)||[]).length;
    if (!blanks) return toast.warning("Không tìm thấy dấu ........ nào");
    if (answers.length < blanks) return toast.warning(`Cần ít nhất ${blanks} đáp án — đang có ${answers.length}`);
    // Create one question per blank (idx must reset per iteration)
    const qs = [];
    for (let i=0;i<blanks;i++) {
      let idx=0;
      qs.push({ type:"fill", stem:text.replace(/\.{6,}/g,(m)=>{ const cur=idx++; return cur===i?"______":m; }), answer: answers[i] });
    }
    const ex = { title:"Đề đục lỗ", description:"Sinh tự động từ file điền khuyết", type:"exam", duration:20, antiCheat:true, questions: qs };
    createExamDialog(ex);
  }});
  go2.append(icon("sparkles"),el("span",{text:"Tạo đề điền khuyết"}));
  p2.append(
    el("div",{class:"field"},[el("label",{text:"Đoạn văn"}), blankText]),
    el("div",{class:"field"},[el("label",{text:"Đáp án"}), blankAns]),
    el("div",{class:"row"},[go2])
  );
  wrap.appendChild(p2);
  return wrap;
}

async function getGeminiKey(){
  const s = await getDoc(doc(db,"global","settings"));
  return s.exists() ? (s.data().geminiApiKey||"") : "";
}

async function geminiGenerate(apiKey, material, answerKey, requirement){
  const model = "gemini-1.5-flash";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const prompt = `Bạn là trợ lý tạo đề thi. Dựa vào TÀI LIỆU, FILE ĐÁP ÁN (nếu có) và YÊU CẦU của giáo viên, hãy trả về JSON hợp lệ theo đúng schema:
{"questions": [ {"type": "mcq"|"fill"|"short", "stem": "nội dung", "options": ["A","B","C","D"], "answer": 0} ]}
- Với mcq: answer là chỉ số 0..n của đáp án đúng.
- Với fill/short: không có options, answer là chuỗi đáp án (hoặc mảng chuỗi nếu nhiều đáp án đều đúng).
- Trả về THUẦN JSON, không thêm giải thích hay markdown.

YÊU CẦU:
${requirement || "Tạo 10 câu hỏi phù hợp."}

TÀI LIỆU:
${material}

FILE ĐÁP ÁN (nếu có):
${answerKey||""}
`;
  const res = await fetch(url, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      contents:[{ parts:[{ text: prompt }] }],
      generationConfig:{ temperature:0.4, responseMimeType:"application/json" }
    })
  });
  if (!res.ok) {
    const t = await res.text(); throw new Error("Gemini lỗi: "+res.status+" "+t.slice(0,200));
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("") || "";
  let obj = null;
  try { obj = JSON.parse(text); }
  catch { const m = text.match(/\{[\s\S]*\}/); if (m) obj = JSON.parse(m[0]); }
  return obj?.questions || [];
}

async function geminiGrade(apiKey, question, userAnswer){
  const model = "gemini-1.5-flash";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const prompt = `Bạn là trợ lý chấm bài khoan dung. Cho 1 câu hỏi và đáp án chuẩn, xác định câu trả lời của học sinh là ĐÚNG, GẦN ĐÚNG hay SAI. Trả về JSON: {"verdict":"correct"|"partial"|"wrong","score":0..1,"reason":"..."}. Không thêm markdown.

CÂU HỎI: ${question.stem}
ĐÁP ÁN CHUẨN: ${Array.isArray(question.answer)?question.answer.join(" | "):question.answer}
CÂU TRẢ LỜI HS: ${userAnswer}`;
  try {
    const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,responseMimeType:"application/json"}})});
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("") || "";
    const obj = JSON.parse(text);
    return obj;
  } catch { return { verdict:"wrong", score:0, reason:"AI lỗi" }; }
}

/* ---------- Teacher stats ---------- */
function teacherStats(){
  const wrap = el("div",{class:"stack"});
  const stats = {
    total: el("div",{class:"stat"},[el("div",{class:"l",text:"Bài nộp"}), el("div",{class:"v",text:"—"})]),
    avg:   el("div",{class:"stat"},[el("div",{class:"l",text:"Điểm TB"}), el("div",{class:"v",text:"—"})]),
    best:  el("div",{class:"stat"},[el("div",{class:"l",text:"Cao nhất"}), el("div",{class:"v",text:"—"})]),
    viol:  el("div",{class:"stat"},[el("div",{class:"l",text:"Tổng lần thoát"}), el("div",{class:"v",text:"—"})])
  };
  const statRow = el("div",{class:"grid g-4"});
  Object.values(stats).forEach(s=>statRow.appendChild(s));
  wrap.appendChild(statRow);
  const p = el("div",{class:"panel"});
  p.innerHTML = `<div class="card-h"><div class="card-t">${ICONS.chart}<span>Thống kê bài nộp</span></div></div>
  <p class="dim">Tổng hợp điểm số, số lần làm, số lần thoát màn hình của học sinh.</p>`;
  const exportBtn = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>exportSubmissionsCSV()});
  exportBtn.append(icon("upload"), el("span",{text:"Xuất CSV"}));
  p.appendChild(el("div",{class:"row end"},[exportBtn]));
  wrap.appendChild(p);
  const chartWrap = el("div",{class:"panel",id:"chart-wrap"});
  chartWrap.innerHTML = `<div class="card-h"><div class="card-t">${ICONS.chart}<span>Phân bố điểm (bar chart)</span></div></div>`;
  const chartHost = el("div",{id:"chart-host",style:{height:"220px"}});
  chartWrap.appendChild(chartHost);
  wrap.appendChild(chartWrap);
  const table = el("div",{class:"table-wrap"});
  let rowsCache = [];
  const u = onSnapshot(query(collection(db,"submissions"), where("teacherId","==",state.user.uid)), s => {
    const rows = []; s.forEach(d => rows.push({id:d.id, ...d.data()}));
    rows.sort((a,b)=>(b.submittedAt?.seconds||0)-(a.submittedAt?.seconds||0));
    rowsCache = rows;
    // aggregate stats
    if (rows.length){
      const scores = rows.map(r=>r.score||0);
      const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
      const best = Math.max(...scores);
      const viols = rows.reduce((a,b)=>a+(b.violations||0),0);
      stats.total.querySelector(".v").textContent = rows.length;
      stats.avg.querySelector(".v").textContent = Math.round(avg*100)+"%";
      stats.best.querySelector(".v").textContent = Math.round(best*100)+"%";
      stats.viol.querySelector(".v").textContent = viols;
    } else {
      Object.values(stats).forEach(s=>s.querySelector(".v").textContent = "0");
    }
    // chart
    renderScoreChart(chartHost, rows);
    // table
    const t = el("table",{class:"table"});
    t.innerHTML = `<thead><tr><th>Học sinh</th><th>Đề</th><th>Điểm</th><th>Số câu đúng</th><th>Lần thoát</th><th>Lần làm</th><th>Nộp lúc</th></tr></thead>`;
    const tb = el("tbody");
    if (!rows.length) tb.innerHTML = `<tr><td colspan="7" class="empty">Chưa có bài nộp.</td></tr>`;
    rows.forEach(r => {
      const pct = r.score!=null? Math.round(r.score*100):null;
      const tr = el("tr");
      const cls = pct==null?"":pct>=70?"ok":pct>=40?"mid":"bad";
      tr.innerHTML = `<td>${esc(r.studentName||"?")}</td><td>${esc(r.examTitle||r.examId)}</td><td>${pct==null?"—":`<span class="pill-score ${cls}">${pct}%</span>`}</td><td>${r.correctCount??"—"} / ${r.total??"?"}</td><td>${r.violations||0}</td><td>${r.attemptNo||1}</td><td class="fs-13 dim">${fmtDate(r.submittedAt)}</td>`;
      tb.appendChild(tr);
    });
    t.appendChild(tb); table.innerHTML=""; table.appendChild(t);
  });
  state.subs.push(u);
  wrap.append(el("div",{class:"panel"},[table]));
  function exportSubmissionsCSV(){
    if (!rowsCache.length) return toast.warning("Không có dữ liệu để xuất");
    const header = ["Student","Exam","Score","Correct","Total","Violations","AttemptNo","SubmittedAt"];
    const rows = rowsCache.map(r => [
      (r.studentName||"").replace(/"/g,'""'),
      (r.examTitle||r.examId||"").replace(/"/g,'""'),
      r.score!=null?Math.round(r.score*100)+"%":"",
      r.correctCount??"",
      r.total??"",
      r.violations||0,
      r.attemptNo||1,
      (r.submittedAt?.toDate?.() || new Date()).toISOString()
    ]);
    const csv = [header, ...rows].map(r => r.map(v => `"${String(v)}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `examhub-submissions-${Date.now()}.csv`;
    a.click();
    toast.success("Đã tải CSV");
  }
  return wrap;
}

/* SVG bar chart for score distribution (10 buckets, 0..100). */
function renderScoreChart(host, rows){
  host.innerHTML = "";
  const buckets = Array(10).fill(0);
  rows.forEach(r => { const p = Math.min(9, Math.max(0, Math.floor((r.score||0)*10))); buckets[p]++; });
  const max = Math.max(1, ...buckets);
  const w = host.clientWidth || 700, h = 200;
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
  svg.setAttribute("width","100%"); svg.setAttribute("height",h);
  const gap = 8;
  const bw = (w - gap*11) / 10;
  buckets.forEach((v,i) => {
    const bh = (v/max) * (h-40);
    const x = gap + i*(bw+gap);
    const y = h - 22 - bh;
    const grad = `url(#barg-${i})`;
    const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x",x); rect.setAttribute("y",y); rect.setAttribute("width",bw); rect.setAttribute("height",bh);
    rect.setAttribute("rx","6"); rect.setAttribute("fill","url(#barg)");
    svg.appendChild(rect);
    const lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
    lbl.setAttribute("x", x + bw/2); lbl.setAttribute("y", h-6); lbl.setAttribute("text-anchor","middle");
    lbl.setAttribute("font-size","11"); lbl.setAttribute("fill","rgba(169,176,214,.8)");
    lbl.textContent = `${i*10}-${i*10+9}`;
    svg.appendChild(lbl);
    if (v){
      const vt = document.createElementNS("http://www.w3.org/2000/svg","text");
      vt.setAttribute("x", x + bw/2); vt.setAttribute("y", y - 4); vt.setAttribute("text-anchor","middle");
      vt.setAttribute("font-size","12"); vt.setAttribute("font-weight","700"); vt.setAttribute("fill","#eef1ff");
      vt.textContent = v;
      svg.appendChild(vt);
    }
  });
  // Gradient defs
  const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
  defs.innerHTML = `<linearGradient id="barg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#7c5cff"/><stop offset="100%" stop-color="#00d4ff"/></linearGradient>`;
  svg.appendChild(defs);
  host.appendChild(svg);
}
