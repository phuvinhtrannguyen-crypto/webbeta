/* =========================================================
   JOIN flow (when student opens link without login)
   ========================================================= */
function renderJoin(params){
  const wrap = el("div",{class:"screen",style:{minHeight:"100vh",display:"grid",placeItems:"center",padding:"20px"}});
  const card = el("div",{class:"auth-box"});
  const examId = params.examId;
  card.innerHTML = `<h2 class="text-gradient">Vào phòng thi</h2><div class="sub">Nhập tên hoặc đăng nhập để bắt đầu.</div>`;
  const name = el("input",{class:"input",placeholder:"Họ và tên của bạn"});
  const code = el("input",{class:"input",placeholder:"Mã HS (nếu có)"});
  const startBtn = el("button",{class:"btn btn-primary btn-block btn-lg",onclick:async()=>{
    if (!name.value.trim()) return toast.warning("Nhập tên để tiếp tục");
    // Anonymous session in-memory
    // Keep the optional code as the student typed it (may be empty). A random
    // id is only used for the DB studentId, never for the lock key — the lock
    // key must be stable across reloads so the per-student anti-cheat lock
    // survives a page refresh for the same student identity.
    state.anonStudent = { name: name.value.trim(), code: code.value.trim() };
    // Sign in anonymously so submissions.create can require isSignedIn() and
    // still work for the #join flow. Without this, Firestore rules must allow
    // unauthenticated writes and bots can spam forged submissions.
    startBtn.classList.add("loading");
    try {
      if (!auth.currentUser) await signInAnonymously(auth);
    } catch(err) {
      startBtn.classList.remove("loading");
      toast.error("Không vào được phòng thi", err.message||String(err));
      return;
    }
    startBtn.classList.remove("loading");
    navigate("exam",{examId, anon:true});
  }});
  startBtn.append(icon("play"),el("span",{text:"Bắt đầu làm bài"}));
  const or = el("div",{class:"divider",text:"hoặc"});
  const login = el("button",{class:"btn btn-ghost btn-block",onclick:()=>navigate("auth"),text:"Đăng nhập bằng tài khoản"});
  card.append(
    el("div",{class:"stack"},[
      el("div",{class:"field"},[el("label",{text:"Họ và tên"}), name]),
      el("div",{class:"field"},[el("label",{text:"Mã HS (tuỳ chọn)"}), code]),
      startBtn, or, login
    ])
  );
  wrap.appendChild(card);
  return wrap;
}

/* Per-student lock persistence — avoids locking the whole exam for all students
   when only one student exceeds the violation cap. */
function studentLockKey(examId, anon){
  let sid;
  if (anon) {
    // Prefer the name (always typed) for a stable identifier across reloads;
    // fall back to typed code. Lowercase+trim to avoid case-only mismatches.
    const nm = (state.anonStudent?.name||"").trim().toLowerCase();
    const cd = (state.anonStudent?.code||"").trim().toLowerCase();
    sid = nm ? (cd ? `${nm}|${cd}` : nm) : cd;
  } else {
    sid = state.user?.uid;
  }
  if (!sid) return null;
  return `examhub.lock.${examId}.${sid}`;
}

/* =========================================================
   EXAM VIEW (the student takes the exam)
   - Fullscreen guard
   - Blur/visibility tracking → violation counter
   - Copy/paste blocked (when flag on)
   - Auto-submit when out of time or max violations hit
   ========================================================= */
function renderExam(params){
  const root = el("div",{class:"screen",style:{minHeight:"100vh",background:"var(--bg-0)"}});
  const inner = el("div");
  root.appendChild(inner);
  inner.innerHTML = `<div class="blank" style="min-height:60vh"><div class="ic">${ICONS.exam}</div><div>Đang tải đề…</div></div>`;
  (async () => {
    const examSnap = await getDoc(doc(db,"exams",params.examId));
    if (!examSnap.exists()) { inner.innerHTML = `<div class="blank"><div class="ic">${ICONS.warn}</div><div>Đề không tồn tại</div></div>`; return; }
    const ex = {id:examSnap.id, ...examSnap.data()};
    if (ex.locked) return appRoot.replaceChildren(renderLocked({examTitle:ex.title, reason:"Bài thi đã bị khoá bởi giáo viên"}));
    if (ex.requireLogin && !state.user) { navigate("auth"); return; }
    // Per-student violation lock: stored locally so one cheater doesn't block others.
    const lockKey = studentLockKey(ex.id, params.anon);
    if (lockKey && localStorage.getItem(lockKey) === "1") {
      return appRoot.replaceChildren(renderLocked({examTitle:ex.title, reason:"Bạn đã vượt số lần thoát cho phép. Liên hệ giáo viên để mở lại."}));
    }
    runExam(inner, ex, params.anon);
  })();
  return root;
}

function runExam(container, ex, anon){
  const studentName = anon ? (state.anonStudent?.name || "Học sinh") : (state.profile?.displayName || state.user?.email || "Học sinh");
  const studentId = anon ? "anon_"+(state.anonStudent?.code||uid(6)) : state.user.uid;
  const answers = {};
  let violations = 0;
  let locked = false;
  let submitted = false;
  let deadline = Date.now() + (ex.duration||30)*60*1000;
  document.body.classList.add("student-active");

  const top = el("div",{class:"exam-top"});
  const leftBtn = el("button",{class:"btn btn-ghost btn-sm",onclick:()=>confirmLeave()});
  leftBtn.append(icon("close"),el("span",{text:"Thoát"}));
  const title = el("div",{class:"name",text:ex.title||"(không tên)"});
  const meta = el("div",{class:"meta"});
  const timer = el("span",{class:"timer-pill"});
  timer.innerHTML = `${ICONS.clock} <span id="t-val">—</span>`;
  const vio = el("span",{class:"violations-pill",id:"v-pill"});
  vio.innerHTML = `${ICONS.warn} <span><span id="v-val">0</span>/${ex.maxViolations||3} lần thoát</span>`;
  const fullscreenBtn = el("button",{class:"btn btn-ghost btn-sm",onclick:enterFullscreen});
  fullscreenBtn.append(icon("expand"),el("span",{text:"Toàn màn hình"}));
  meta.append(timer, vio, fullscreenBtn);
  if (canAutofill(state.profile)) {
    const afBtn = el("button",{class:"btn btn-accent btn-sm",onclick:autofillAll});
    afBtn.append(icon("sparkles"), el("span",{text:"Điền tất cả"}));
    meta.appendChild(afBtn);
  }
  const submitBtn = el("button",{class:"btn btn-primary btn-sm",onclick: ()=>confirmSubmit()});
  submitBtn.append(icon("check"), el("span",{text:"Nộp bài"}));
  meta.appendChild(submitBtn);
  top.append(leftBtn, title, el("div",{class:"spacer",style:{flex:1}}), meta);
  container.innerHTML = "";
  container.appendChild(top);

  const body = el("div",{class:"exam-body"});
  // Progress bar
  const prog = el("div",{class:"progress"},[el("span",{style:{width:"0%"}})]);
  body.appendChild(prog);
  // Info card
  const info = el("div",{class:"card",style:{marginTop:"14px"}});
  info.innerHTML = `
    <div class="card-h"><div class="card-t">${ICONS.info}<span>${esc(ex.title)}</span></div><span class="chip">${ex.type||"exam"} · ${(ex.questions||[]).length} câu · ${ex.duration||0} phút</span></div>
    <p class="dim fs-13">${nl2br(ex.description||"")}</p>
    ${ex.antiCheat ? `<div class="chip is-warning" style="margin-top:6px">${ICONS.shield} Chống gian lận đang BẬT. Bạn phải ở toàn màn hình & không được rời bài quá ${ex.maxViolations||3} lần.</div>`:""}
  `;
  body.appendChild(info);
  // Questions
  (ex.questions||[]).forEach((q,i) => {
    const qCard = el("div",{class:"q",id:`q-${i}`});
    qCard.innerHTML = `<div class="idx">Câu ${i+1}/${ex.questions.length}</div>`;
    // Render stem — special: replace ........ with <input class="blank-input">
    if (q.type === "fill") {
      const stemHtml = esc(q.stem||"").replace(/\.{6,}|_{3,}/g, `<input class="blank-input" data-q="${i}" placeholder="điền…" />`);
      const stem = el("div",{class:"stem"}); stem.innerHTML = stemHtml;
      qCard.appendChild(stem);
      stem.querySelectorAll(".blank-input").forEach(inp => {
        inp.addEventListener("input", () => { answers[i] = inp.value; });
      });
    } else {
      const stem = el("div",{class:"stem",text:q.stem||""});
      qCard.appendChild(stem);
    }
    if (q.type === "mcq") {
      const opts = el("div",{class:"opts"});
      (q.options||[]).forEach((opt,oi) => {
        const k = String.fromCharCode(65+oi);
        const d = el("div",{class:"opt",tabindex:0});
        d.innerHTML = `<span class="k">${k}</span><span>${nl2br(opt)}</span>`;
        d.addEventListener("click", ()=>{
          opts.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
          d.classList.add("sel");
          answers[i] = oi;
          updateProgress();
        });
        opts.appendChild(d);
      });
      qCard.appendChild(opts);
    } else if (q.type === "short") {
      const input = el("textarea",{class:"textarea",rows:3,placeholder:"Nhập câu trả lời…"});
      input.addEventListener("input",()=>{ answers[i]=input.value; updateProgress(); });
      qCard.appendChild(input);
    } else if (q.type === "fill") {
      // already handled above
    }
    body.appendChild(qCard);
  });
  const submitBig = el("button",{class:"btn btn-primary btn-lg btn-block",onclick:()=>confirmSubmit()});
  submitBig.append(icon("check"),el("span",{text:"Nộp bài"}));
  body.appendChild(submitBig);
  container.appendChild(body);

  function updateProgress(){
    const done = Object.keys(answers).filter(k=>answers[k]!=null && answers[k]!=="").length;
    prog.firstChild.style.width = Math.round(done/(ex.questions.length||1)*100)+"%";
  }
  async function autofillAll(){
    // Admin/subadmin feature — pull private answers before auto-filling.
    try { await loadExamAnswers(ex); }
    catch(err) { toast.error("Không tải được đáp án", err.message||""); return; }
    ex.questions.forEach((q,i) => {
      if (q.type==="mcq") {
        const idx = typeof q.answer === "number" ? q.answer : (typeof q.answer==="string"? "ABCDE".indexOf(q.answer.toUpperCase()):0);
        answers[i] = idx;
        const card = body.querySelector(`#q-${i} .opts`);
        if (card){ card.querySelectorAll(".opt").forEach((n,j)=>n.classList.toggle("sel",j===idx)); }
      } else {
        const v = Array.isArray(q.answer) ? q.answer[0] : (q.answer||"");
        answers[i] = v;
        const card = body.querySelector(`#q-${i}`);
        if (card){
          const ta = card.querySelector("textarea"); if (ta) ta.value = v;
          const bi = card.querySelectorAll(".blank-input"); bi.forEach(inp=>inp.value = v);
        }
      }
    });
    updateProgress();
    toast.success("Đã tự điền (Admin/Phó admin)");
  }

  /* ---------- Timer ---------- */
  const timerI = setInterval(()=>{
    const left = deadline - Date.now();
    if (left <= 0) { clearInterval(timerI); submitExam(true); return; }
    const s = Math.floor(left/1000);
    const mm = String(Math.floor(s/60)).padStart(2,"0");
    const ss = String(s%60).padStart(2,"0");
    const el2 = $("#t-val"); if (el2) el2.textContent = mm+":"+ss;
  }, 500);

  /* ---------- Anti-cheat ---------- */
  const cheat = ex.antiCheat !== false;
  async function enterFullscreen(){
    try { await document.documentElement.requestFullscreen({navigationUI:"hide"}); }
    catch(err){ toast.warning("Không bật được fullscreen", err.message||""); }
  }
  if (cheat && ex.requireFullscreen !== false) {
    setTimeout(enterFullscreen, 80);
  }
  let lastViolationAt = 0;
  function onVisChange(){
    if (!cheat || submitted) return;
    if (document.hidden || !document.fullscreenElement) {
      // Debounce: visibilitychange + fullscreenchange + blur all fire for a
      // single exit-fullscreen action. Only count once per ~1s window.
      const now = Date.now();
      if (now - lastViolationAt < 1000) return;
      lastViolationAt = now;
      violations++;
      $("#v-val").textContent = violations;
      updateDoc(doc(db,"exams",ex.id),{}).catch(()=>{});
      // log event
      addDoc(collection(db,"events"),{
        type:"violation", reason: document.hidden?"hidden":"exit-fullscreen",
        examId:ex.id, examTitle:ex.title, teacherId:ex.teacherId,
        studentId, studentName, count:violations,
        createdAt:serverTimestamp()
      }).catch(()=>{});
      toast.warning(`Cảnh báo gian lận ${violations}/${ex.maxViolations||3}`, "Quay lại toàn màn hình để tiếp tục.");
      if (violations >= (ex.maxViolations||3)) {
        locked = true;
        // Per-student lock only: do NOT write locked:true on the shared exam doc
        // (that would block every other student). Persist a client-side lock flag
        // so the same student can't just refresh to bypass the cap.
        const lk = studentLockKey(ex.id, anon);
        if (lk) { try { localStorage.setItem(lk, "1"); } catch(_){} }
        submitExam(false, true);
      }
    }
  }
  const visHandler = onVisChange;
  const fsHandler = onVisChange;
  const blurHandler = onVisChange;
  document.addEventListener("visibilitychange", visHandler);
  document.addEventListener("fullscreenchange", fsHandler);
  window.addEventListener("blur", blurHandler);
  // Block copy/paste/ctx menu
  const blockCopy = ex.blockCopy !== false && cheat;
  const kblock = (e) => {
    if (!blockCopy) return;
    if ((e.ctrlKey||e.metaKey) && ["c","v","x","a","s","p","u"].includes((e.key||"").toLowerCase())) e.preventDefault();
    if (e.key==="F12") e.preventDefault();
  };
  const copyBlock = (e) => { if (blockCopy) e.preventDefault(); };
  const ctxBlock = (e) => { if (blockCopy) e.preventDefault(); };
  document.addEventListener("keydown", kblock, true);
  ["copy","cut","paste"].forEach(n => document.addEventListener(n, copyBlock, true));
  document.addEventListener("contextmenu", ctxBlock, true);

  function confirmLeave(){
    confirmDialog({title:"Thoát bài?",message:"Bài làm hiện tại chưa được nộp. Thoát ra đồng nghĩa tính 1 lần thoát màn hình.",danger:true,okText:"Thoát"}).then(ok=>{
      if (ok) { cleanup(); if (document.fullscreenElement) document.exitFullscreen().catch(()=>{}); navigate(anon?"join":"student",{examId:ex.id}); }
    });
  }
  function confirmSubmit(){
    confirmDialog({title:"Nộp bài?",message:"Bạn chắc chắn nộp bài ngay bây giờ?",okText:"Nộp"}).then(ok=>{ if (ok) submitExam(false); });
  }
  function cleanup(){
    clearInterval(timerI);
    document.removeEventListener("visibilitychange", visHandler);
    document.removeEventListener("fullscreenchange", fsHandler);
    window.removeEventListener("blur", blurHandler);
    document.removeEventListener("keydown", kblock, true);
    ["copy","cut","paste"].forEach(n => document.removeEventListener(n, copyBlock, true));
    document.removeEventListener("contextmenu", ctxBlock, true);
    document.body.classList.remove("student-active");
  }
  async function submitExam(timedOut=false, wasLocked=false){
    if (submitted) return; submitted = true;
    cleanup();
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    // Pull answers from the private subcollection just-in-time for grading.
    // The main exam doc no longer carries answer fields (prevents casual
    // answer leakage via the public exam doc's REST read).
    try {
      await loadExamAnswers(ex);
    } catch(err) {
      // Don't persist a bogus score:0 submission if we can't fetch the key.
      console.error("loadExamAnswers failed", err);
      toast.error("Không chấm được bài", "Không tải được đáp án. Kiểm tra mạng rồi thử lại.");
      submitted = false;
      return;
    }
    // Grade
    const { score, correctCount, total, grading } = await gradeExam(ex, answers);
    // Save submission
    try {
      const sub = {
        examId:ex.id, examTitle:ex.title, teacherId: ex.teacherId,
        studentId, studentName, answers, grading, score, correctCount, total,
        violations, submittedAt: serverTimestamp(), timedOut, wasLocked, attemptNo: 1
      };
      await addDoc(collection(db,"submissions"), sub);
    } catch(err){ console.error(err); }
    // Result screen
    state.route="result";
    appRoot.replaceChildren(renderResult({ex, answers, grading, score, correctCount, total, violations, timedOut, wasLocked}));
  }
}

/* ---------- Private answer storage helpers ----------
   Correct answers are no longer embedded in the public `exams/{eid}` document —
   they live in `exams/{eid}/private/answers` so that a trivial REST read of
   the exams listing doesn't leak answer keys. Client-side grading (including
   the anonymous #join flow) fetches this subdoc just-in-time at submission
   time. A fully hardened design would grade server-side in a Cloud Function;
   these helpers are the minimum structural step in that direction. */
async function writeExamAnswers(examId, questions){
  const answers = (questions||[]).map(q => q.answer ?? null);
  await setDoc(doc(db,"exams",examId,"private","answers"), {
    answers, updatedAt: serverTimestamp()
  });
}
async function loadExamAnswers(ex){
  if (!ex || !ex.id) throw new Error("missing exam id");
  // Fail loudly rather than silently — if grading can't fetch answers, a
  // silent failure would score every question 0 and persist that to Firestore.
  const s = await getDoc(doc(db,"exams",ex.id,"private","answers"));
  if (!s.exists()) {
    // Legacy exams (created before the answer-subcollection split) still carry
    // `answer` inline on each question; treat missing subdoc as a no-op so
    // grading falls back to the inline data.
    return ex;
  }
  const arr = s.data().answers || [];
  ex.questions = (ex.questions||[]).map((q,i) => ({ ...q, answer: arr[i] }));
  return ex;
}
function stripAnswersFromQuestions(questions){
  return (questions||[]).map(q => {
    const { answer, ...rest } = q || {};
    return rest;
  });
}

/* ---------- Grading ---------- */
async function gradeExam(ex, answers){
  const grading = {};
  let correctCount = 0, total = ex.questions.length, scoreSum = 0;
  for (let i=0;i<ex.questions.length;i++) {
    const q = ex.questions[i];
    const ua = answers[i];
    let isCorrect = false, pt = 0;
    if (ua == null || ua === "") { grading[i] = false; continue; }
    if (q.type === "mcq") {
      const ans = typeof q.answer === "string" ? "ABCDE".indexOf(q.answer.toUpperCase()) : q.answer;
      isCorrect = Number(ua) === Number(ans);
      pt = isCorrect ? 1 : 0;
      grading[i] = isCorrect;
    } else {
      // fuzzy match
      const acc = Array.isArray(q.answer) ? q.answer : [q.answer];
      const sim = Math.max(...acc.map(a => stringSimilarity(normalize(a), normalize(ua))));
      if (sim >= 0.95) { grading[i] = true; isCorrect=true; pt=1; }
      else if (sim >= 0.7) { grading[i] = "partial"; pt=0.5; }
      else { grading[i] = false; pt=0; }
    }
    if (isCorrect) correctCount++;
    scoreSum += pt;
  }
  const score = total ? scoreSum/total : 0;
  return { score, correctCount, total, grading };
}
// Normalize for fuzzy grading: lowercase, strip Vietnamese diacritics, strip
// punctuation, and collapse whitespace entirely. Removing spaces (rather than
// just collapsing them) keeps a bigram match between forms like "hanoi" and
// "Hà Nội" well above the 0.95 full-credit threshold — otherwise "ha noi" vs
// "hanoi" scores only ~0.67 and gets 0/1.
function normalize(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/[^a-z0-9]/g,""); }
function stringSimilarity(a,b){
  if (!a && !b) return 1;
  if (!a || !b) return 0;
  if (a===b) return 1;
  // Dice's coefficient on bigrams
  const bigrams = (s) => { const r={}; for (let i=0;i<s.length-1;i++) { const k=s.substr(i,2); r[k]=(r[k]||0)+1; } return r; };
  const A = bigrams(a), B = bigrams(b);
  let inter = 0, totalA = 0, totalB = 0;
  for (const k in A) { totalA += A[k]; if (B[k]) inter += Math.min(A[k],B[k]); }
  for (const k in B) totalB += B[k];
  if (!(totalA+totalB)) return 0;
  return (2*inter)/(totalA+totalB);
}

/* =========================================================
   Initial auth routing
   ========================================================= */
if (auth) {
  onAuthStateChanged(auth, async (user) => {
    // hash routing for join links
    const hash = location.hash || "";
    // Anonymous (signInAnonymously) users are a "virtual" identity used only so
    // submissions.create can require isSignedIn(). Never create or load a user
    // profile for them, and never reroute them away from the current exam flow
    // (otherwise clicking "Bắt đầu làm bài" would reset the user to the join
    // screen right after the anonymous sign-in succeeds).
    if (user?.isAnonymous) {
      state.user = user;
      state.profile = null;
      if (state.route === "exam" || state.route === "result" || state.route === "join") return;
      if (hash.startsWith("#join/")) { navigate("join",{examId: hash.slice(6)}); return; }
      return;
    }
    if (hash.startsWith("#join/")) {
      const examId = hash.slice(6);
      state.user = user || null;
      state.profile = user ? await ensureUserProfile(user).catch(()=>null) : null;
      navigate("join",{examId});
      return;
    }
    if (!user) {
      state.user=null; state.profile=null;
      navigate("auth");
      return;
    }
    state.user = user;
    try { state.profile = await ensureUserProfile(user); }
    catch(err){ console.error(err); toast.error("Không tải được hồ sơ", prettyAuthError(err)); state.profile = null; }
    if (!state.profile) { navigate("auth"); return; }
    if (state.profile.status === "disabled") { toast.error("Tài khoản đã bị khoá"); await signOut(auth); return; }
    if (isAdmin(state.profile) || isSubAdmin(state.profile)) navigate("admin",{tab:"overview"});
    else if (isTeacher(state.profile)) navigate("teacher",{tab:"overview"});
    else navigate("student");
  });
  window.addEventListener("hashchange", () => {
    const hash = location.hash || "";
    if (hash.startsWith("#join/")) {
      const examId = hash.slice(6);
      navigate("join",{examId});
    }
  });
} else {
  navigate("auth");
}

      </div>
      <div class="panel"><div class="card-t">${ICONS.wand}<span>Chấm điểm fuzzy</span></div>
        <ul class="dim" style="padding-left:18px;line-height:1.7">
          <li>Trắc nghiệm: đối chiếu chỉ số</li>
          <li>Điền khuyết/tự luận: so khớp chuỗi chuẩn hoá (không dấu, lowercase)</li>
          <li>Dùng hệ số Dice — ≥0.95 = đúng, ≥0.7 = 1 phần (nửa điểm), &lt;0.7 = sai</li>
          <li>Có thể tích hợp Gemini để chấm tự luận (hàm <code class="mono">geminiGrade</code>)</li>
        </ul>
      </div>
    </div>
    <div class="panel">
      <div class="card-t">${ICONS.users}<span>Phân quyền</span></div>
      <div class="chips mt-2">
        <span class="chip is-primary">Admin</span><span class="muted fs-13">${ADMIN_EMAIL} — toàn quyền</span>
      </div>
      <div class="chips mt-2">
        <span class="chip is-primary" style="background:rgba(255,176,32,.14);border-color:rgba(255,176,32,.45);color:#ffd993">Phó admin</span><span class="muted fs-13">Do admin cấp — gần như toàn quyền, trừ thay đổi role admin/phó admin</span>
      </div>
      <div class="chips mt-2">
        <span class="chip is-info">Giáo viên</span><span class="muted fs-13">Tạo lớp, HS, đề, thống kê</span>
      </div>
      <div class="chips mt-2">
        <span class="chip is-success">Học sinh</span><span class="muted fs-13">Làm bài qua link hoặc qua dashboard của mình</span>
      </div>
    </div>
    <div class="panel danger">
      <div class="card-t">${ICONS.warn}<span>Cảnh báo quan trọng</span></div>
      <ul class="dim" style="padding-left:18px;line-height:1.7">
        <li>Vì đây là app client-side, Gemini API key lưu trong Firestore có thể bị đọc bởi mọi user có role phù hợp — hãy giới hạn quyền đọc document <code class="mono">global/settings</code> qua rules nếu cần.</li>
        <li>Để an toàn tuyệt đối, proxy Gemini qua Cloud Functions của bạn.</li>
        <li>Chống gian lận trên web không phải 100% — nó chỉ nâng rào cản.</li>

  `;
  openModal({title:"Hướng dẫn & mẹo dùng", size:"xl", body, actions:[]});
}

/* =========================================================
   Small UX: register SW-less warmup + preload of fonts
   (no service worker to keep single-file simple).
   ========================================================= */
(function warmup(){
  const links = [
    "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
    "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
    "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js",
  ];
  links.forEach(href => {
    const l = document.createElement("link");
    l.rel = "modulepreload"; l.href = href; document.head.appendChild(l);
  });
})();

/* =====================================================
   Additional CSS: responsive, print, accessibility,
   animated buttons, loading skeletons, scrollbar tweaks,

/* Responsive tweaks */

  .result-score{font-size:56px}
  .btn-lg{padding:12px 16px}
  .stat{padding:14px}
  .stat .v{font-size:24px}
  .side{width:240px}
}
@media (max-width:720px){

@media (max-height:640px) and (orientation:landscape){

}

/* Print — clean for result screen */
@media print{
  .topbar,.side,.aurora,.aurora-2,.toasts,.exam-top{display:none!important}
  body{background:#fff!important;color:#000!important}
  .panel,.card,.q,.result-card{box-shadow:none!important;background:#fff!important;border-color:#ddd!important}
  .result-score{color:#000!important;-webkit-text-fill-color:#000!important;background:none!important}
  .chip,.tag,.pill-score{border-color:#000!important;color:#000!important;background:#fff!important}
}

/* Accessibility — reduced motion */
@media (prefers-reduced-motion: reduce){
  .aurora,.aurora-2{animation:none!important;filter:none!important;opacity:.25!important}

}

/* Focus ring polish */
.btn:focus-visible,.input:focus-visible,.textarea:focus-visible,.select:focus-visible,.nav a:focus-visible,.opt:focus-visible{
  outline:none;box-shadow:var(--ring);border-color:var(--primary-2)
}

/* Select caret */
.select{appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--text-dim) 50%),linear-gradient(135deg,var(--text-dim) 50%,transparent 50%);background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:36px}

/* Details transition */
details.cfg{transition:background .15s ease}
details.cfg[open]{background:var(--surface-3)}
details.cfg summary{padding:4px 0}
details.cfg summary::after{content:"▾";float:right;transition:transform .15s ease}
details.cfg[open] summary::after{transform:rotate(180deg)}

/* State colors on question cards */
.q.wrong{border-color:rgba(255,94,126,.4);background:rgba(255,94,126,.04)}
.q.right{border-color:rgba(50,213,131,.4);background:rgba(50,213,131,.04)}

/* Active opt tick */
.q .opt.sel .k{color:#fff;background:linear-gradient(135deg,#7c5cff,#00d4ff);padding:0 6px;border-radius:6px}

/* Tooltip arrow */
.tooltip::before{content:"";position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0b0f24;opacity:0;transition:opacity .15s ease;pointer-events:none}
.tooltip:hover::before{opacity:1}

/* Nicer input number spinner */
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* Cool focus on Auth form */
.auth-box .input:focus,.auth-box .textarea:focus,.auth-box .select:focus{border-color:var(--primary-2)}

/* Keep labels small but readable */
label{color:var(--text-dim)}

/* Loading sparkle */
@keyframes sparkle{0%{transform:rotate(0) scale(1)}50%{transform:rotate(10deg) scale(1.12)}100%{transform:rotate(0) scale(1)}}

.table tbody tr.row-highlight{background:linear-gradient(90deg,rgba(124,92,255,.12),transparent 60%)}

/* Notifications bell dot */
.bell-wrap{position:relative}
.bell-wrap .dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--bg-1);box-shadow:0 0 0 3px rgba(255,94,126,.2)}

/* Extra panels */
.panel.highlight{border-color:rgba(124,92,255,.45);background:linear-gradient(180deg,rgba(124,92,255,.08),var(--surface))}

.stat .spark{margin-top:8px;height:32px;width:100%;display:flex;align-items:flex-end;gap:2px}

.exam-stripe-practice{border-left:3px solid #5ac8fa}

.lock-banner{background:rgba(255,94,126,.08);border:1px dashed rgba(255,94,126,.4);color:#ffb3c2;padding:8px 10px;border-radius:10px;display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px}

.elev-1{box-shadow:0 2px 8px rgba(4,8,20,.35)}

.chip.ghost{background:transparent;border-color:var(--stroke)}

.chkgroup{display:flex;flex-wrap:wrap;gap:8px}

.section-title{display:flex;align-items:center;gap:10px;margin:6px 0 2px}

.drop:hover,.drop.is-over{border-color:var(--primary);background:rgba(124,92,255,.08);color:var(--text)}
.drop .ic{margin:0 auto 6px;width:40px;height:40px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center}

/* Gradient text variants */
.text-success{background:linear-gradient(135deg,#32d583,#00d4ff);-webkit-background-clip:text;background-clip:text;color:transparent}

@keyframes live-ping{0%{box-shadow:0 0 0 0 rgba(50,213,131,.6)}80%{box-shadow:0 0 0 8px rgba(50,213,131,0)}100%{box-shadow:0 0 0 0 rgba(50,213,131,0)}}

/* Nice tables on touch */
@media (hover:none){

/* Ensure buttons stay readable on hover with white text */

/* Micro animations for card entering */
@keyframes rise{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}

<div class="footer-tag">ExamHub · built with ♥ for teachers</div>
<script>
document.addEventListener("mousemove", (e) => {
  const b = e.target.closest?.(".btn-primary");
  if (!b) return;
  const r = b.getBoundingClientRect();
  b.style.setProperty("--x", (e.clientX - r.left) + "px");
  b.style.setProperty("--y", (e.clientY - r.top) + "px");
});
</script>
